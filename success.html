<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-ja="お申し込みありがとうございます — KUMAGO">訂購完成 — KUMAGO 家具家電租賃</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="assets/kumago-logo-mark.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .thanks-wrap { min-height: 70vh; display: grid; place-items: center; padding: 60px 0; text-align: center; }
    .thanks-card {
      max-width: 540px; background: var(--white); border: 1px solid var(--line);
      border-radius: var(--radius-lg); box-shadow: var(--shadow); padding: 44px 30px;
    }
    .thanks-badge {
      width: 84px; height: 84px; margin: 0 auto 22px; border-radius: 50%;
      background: #f4faea; display: grid; place-items: center;
    }
    .thanks-badge svg { width: 44px; height: 44px; stroke: var(--green); fill: none; stroke-width: 2.4; }
    .thanks-card h1 { font-size: 1.7rem; margin: 0 0 12px; color: var(--charcoal); }
    .thanks-card p { color: var(--ink-soft); line-height: 1.7; margin: 0 0 10px; }
    .thanks-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 26px; }

    /* LINE handoff */
    .line-step {
      margin-top: 28px; padding-top: 26px; border-top: 1px dashed var(--line); text-align: left;
    }
    .line-step h2 {
      font-size: 1.18rem; margin: 0 0 6px; color: var(--charcoal); text-align: center;
    }
    .line-step > p { text-align: center; margin: 0 0 18px; }
    .line-num {
      display: inline-flex; align-items: center; justify-content: center; flex: none;
      width: 24px; height: 24px; border-radius: 50%; background: var(--green);
      color: #fff; font-weight: 800; font-size: .9rem; margin-right: 8px;
    }
    .line-row { display: flex; align-items: center; margin: 0 0 8px; font-weight: 700; color: var(--charcoal); }
    .btn-line svg { width: 22px; height: 22px; margin-right: 8px; fill: currentColor; }
    .line-cta { display: inline-flex; align-items: center; justify-content: center; }
    .line-sub { font-size: .9rem; color: var(--ink-soft); margin: 6px 0 22px; text-align: center; }
    .line-sub a { color: var(--green-deep); font-weight: 700; }
    .order-box {
      background: var(--cream, #faf7f0); border: 1px solid var(--line); border-radius: var(--radius-lg);
      padding: 14px 16px; margin: 8px 0 10px; font-size: .9rem; line-height: 1.65; color: var(--charcoal);
      white-space: pre-wrap; word-break: break-word; max-height: 220px; overflow-y: auto;
    }
    .copy-btn {
      background: none; border: 1px solid var(--line); color: var(--ink-soft); cursor: pointer;
      font: inherit; font-size: .85rem; font-weight: 700; padding: 7px 14px; border-radius: var(--pill, 999px);
    }
    .copy-btn:hover { border-color: var(--green); color: var(--green-deep); }
  </style>
</head>
<body>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <main class="thanks-wrap">
    <div class="container">
      <div class="thanks-card">
        <div class="thanks-badge">
          <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
        </div>
        <h1 data-ja="お申し込みありがとうございます！">訂購完成，謝謝你！</h1>
        <p data-ja="ご決済が完了しました。確認メールをお送りしています。KUMAGO の担当より配送日時の最終確認をご連絡いたします。">
          付款已完成，確認信已寄出。KUMAGO 專員會再與你聯繫，確認配送日期與時段。
        </p>
        <p data-ja="配送日時の最終確認のため、公式 LINE の追加をお願いいたします。" id="introLine">為了確認配送日期，最後請加入官方 LINE 並把訂單傳給客服。</p>

        <!-- LINE handoff: add the official account, then send the prefilled order -->
        <div class="line-step">
          <h2 data-ja="最後のステップ：公式 LINE で注文を送信" id="lineH2">最後一步：把訂單傳給 LINE 客服</h2>
          <p data-ja="公式 LINE を追加し、ご注文内容をそのまま送信してください。" id="lineDesc">加入官方 LINE 好友，並把下方訂單內容傳送給客服即可。</p>

          <div class="line-row"><span class="line-num">1</span><span data-ja="公式 LINE を友だち追加" id="step1Label">加入官方 LINE 好友</span></div>
          <a id="addFriendBtn" href="https://lin.ee/z3yASqK" target="_blank" rel="noopener" class="btn btn-line btn-block line-cta">
            <svg viewBox="0 0 24 24"><path d="M12 4c4.97 0 9 3.13 9 7 0 3.87-4.03 7-9 7a11 11 0 01-2.4-.26L5 20l1-3.2C4.16 15.5 3 13.4 3 11c0-3.87 4.03-7 9-7z"/></svg>
            <span data-ja="LINE を友だち追加" id="addFriendLabel">加入官方 LINE</span>
          </a>
          <p class="line-sub" data-ja="追加済みの方はそのまま次へ。" id="addFriendSub">已經是好友的話，直接進行下一步即可。</p>

          <div class="line-row"><span class="line-num">2</span><span data-ja="ご注文内容を客服へ送信" id="step2Label">把訂單詳細傳給客服</span></div>
          <!-- LINE 內開啟時由 LIFF 自動代發訂單內容，成功後顯示此列並收起手動傳送鈕 -->
          <p id="autoSentNote" hidden style="background:#f0faf0;color:#0a7a3c;font-weight:700;border-radius:12px;padding:12px 16px;margin:0 0 12px;"
             data-ja="✅ ご注文内容はLINEトークに自動送信されました。手動での送信は不要です。">
            ✅ 訂單內容已自動傳送到 LINE 聊天室，無需再手動傳送。</p>
          <div class="order-box" id="orderBox" hidden></div>
          <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:14px;">
            <button type="button" class="copy-btn" id="copyBtn" hidden data-ja="注文内容をコピー">複製訂單內容</button>
          </div>
          <a id="sendOrderBtn" href="https://line.me/R/ti/p/@967bmevi" target="_blank" rel="noopener" class="btn btn-line btn-block line-cta">
            <svg viewBox="0 0 24 24"><path d="M12 4c4.97 0 9 3.13 9 7 0 3.87-4.03 7-9 7a11 11 0 01-2.4-.26L5 20l1-3.2C4.16 15.5 3 13.4 3 11c0-3.87 4.03-7 9-7z"/></svg>
            <span data-ja="LINE で注文内容を送信" id="sendOrderLabel">用 LINE 傳送訂單詳細</span>
          </a>
        </div>

        <div class="thanks-actions">
          <a href="index.html" class="btn btn-secondary" data-ja="トップへ戻る">回到首頁</a>
        </div>
      </div>
    </div>
  </main>
  <script>
    (function () {
      var KEY = "kumago_paid_order";
      var stash = null;
      try { stash = JSON.parse(localStorage.getItem(KEY) || "null"); } catch (e) { stash = null; }

      // Language: prefer the order's own lang, then ?lang, default zh.
      var urlLang = new URLSearchParams(location.search).get("lang");
      var lang = (stash && stash.lang) || urlLang || "zh";
      if (lang === "ja") {
        document.documentElement.lang = "ja";
        document.querySelectorAll("[data-ja]").forEach(function (el) { el.textContent = el.dataset.ja; });
      }

      // Wire up the prefilled order handoff when we have a stashed order.
      if (stash && stash.msg) {
        var box = document.getElementById("orderBox");
        box.textContent = stash.msg;
        box.hidden = false;

        var sendBtn = document.getElementById("sendOrderBtn");
        if (stash.deeplink) sendBtn.href = stash.deeplink;
        if (stash.addFriend) document.getElementById("addFriendBtn").href = stash.addFriend;

        var copyBtn = document.getElementById("copyBtn");
        copyBtn.hidden = false;
        var copied = lang === "ja" ? "コピーしました ✓" : "已複製 ✓";
        var copyLabel = copyBtn.textContent;
        copyBtn.addEventListener("click", function () {
          var done = function () { copyBtn.textContent = copied; setTimeout(function () { copyBtn.textContent = copyLabel; }, 1800); };
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(stash.msg).then(done, function () {});
          } else {
            var ta = document.createElement("textarea");
            ta.value = stash.msg; document.body.appendChild(ta); ta.select();
            try { document.execCommand("copy"); done(); } catch (e) {}
            document.body.removeChild(ta);
          }
        });

        // Single-use: clear so a later visit to /success won't resurface this order.
        try { localStorage.removeItem(KEY); } catch (e) {}

        // LIFF：LINE 內開啟時，以客人身分自動把訂單內容發進聊天室（聊天串
        // 因此必定建立，客服一定找得到人）。失敗就維持原本的手動傳送流程。
        var LIFF_ID = "2010643698-93v93r0n";
        if (window.liff) {
          liff.init({ liffId: LIFF_ID }).then(function () {
            if (!liff.isInClient()) return;
            return liff.sendMessages([{ type: "text", text: stash.msg }]).then(function () {
              document.getElementById("autoSentNote").hidden = false;
              document.getElementById("sendOrderBtn").hidden = true;
              document.getElementById("copyBtn").hidden = true;
            });
          }).catch(function (e) { console.warn("liff:", e); });
        }
      }
    })();
  </script>
</body>
</html>
